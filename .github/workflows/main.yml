name: Build Android APK

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          setup-java: '21'
          distribution:'temurin'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install Dependencies
        run: pnpm install

      - name: Build Web Project
        run: |
          PORT=3000 BASE_PATH=./ pnpm --filter @workspace/shourov-hub run build
          ls artifacts/shourov-hub/dist/public

      - name: Setup Capacitor Workspace
        run: |
          mkdir -p cap-workspace/www

          cp -r artifacts/shourov-hub/dist/public/. cap-workspace/www/

          cat > cap-workspace/package.json << 'EOF'
{
  "name": "cap-app",
  "version": "1.0.0",
  "description": "",
  "main": "index.js",
  "dependencies": {}
}
EOF

          cat > cap-workspace/capacitor.config.json << 'EOF'
{
  "appId": "com.ec.aoo",
  "appName": "testapp",
  "webDir": "www",
  "server": {
    "androidScheme": "https",
    "hostname": "localhost",
    "cleartext": true
  }
}
EOF

          cd cap-workspace
          npm install @capacitor/core @capacitor/cli @capacitor/android
          npx cap add android
          npx cap sync android

      - name: Build Android APK
        run: |
          cd cap-workspace/android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Mobile-App-APK
          path: cap-workspace/android/app/build/outputs/apk/debug/app-debug.apk
