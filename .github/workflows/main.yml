name: Build Android APK

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install Dependencies
        run: pnpm install

      - name: Build Web Project
        run: |
          PORT=3000 BASE_PATH=./ pnpm --filter @workspace/shourov-hub run build
          ls artifacts/shourov-hub/dist/public

      - name: Setup Capacitor Workspace
        run: |
          mkdir -p cap-workspace/www
          cp -r artifacts/shourov-hub/dist/public/. cap-workspace/www/

          python3 -c "
import json, os

pkg = {
  'name': 'cap-app',
  'version': '1.0.0',
  'description': '',
  'main': 'index.js',
  'dependencies': {}
}
with open('cap-workspace/package.json', 'w') as f:
    json.dump(pkg, f, indent=2)

cap_cfg = {
  'appId': 'com.ec.aoo',
  'appName': 'ShourovHub',
  'webDir': 'www',
  'server': {
    'androidScheme': 'https',
    'hostname': 'localhost',
    'cleartext': True
  }
}
with open('cap-workspace/capacitor.config.json', 'w') as f:
    json.dump(cap_cfg, f, indent=2)
"

          cd cap-workspace
          npm install @capacitor/core @capacitor/cli @capacitor/android
          npx cap add android
          npx cap sync android

      - name: Build Android APK
        run: |
          cd cap-workspace/android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Mobile-App-APK
          path: cap-workspace/android/app/build/outputs/apk/debug/app-debug.apk
