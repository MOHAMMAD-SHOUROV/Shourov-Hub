name: Build Android APK

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: pnpm pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install Dependencies
        run: pnpm install

      - name: Build Web Project
        run: |
          PORT=3000 BASE_PATH=./ pnpm --filter @workspace/shourov-hub run build
          ls artifacts/shourov-hub/dist/public

      - name: Setup Capacitor Config
        run: |
          npm install @capacitor/core @capacitor/cli @capacitor/android

          cat > capacitor.config.json << 'CAPEOF'
          {
            "appId": "com.ec.aoo",
            "appName": "testapp",
            "webDir": "artifacts/shourov-hub/dist/public",
            "server": {
              "androidScheme": "https",
              "hostname": "localhost",
              "cleartext": true
            }
          }
          CAPEOF

          ./node_modules/.bin/cap add android
          ./node_modules/.bin/cap sync android

      - name: Build Android APK
        run: |
          cd android

          echo "configurations.all {
              resolutionStrategy.eachDependency { DependencyResolveDetails details ->
                  if (details.requested.group == 'org.jetbrains.kotlin') {
                      details.useVersion '1.8.22'
                  }
              }
          }" >> app/build.gradle

          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Mobile-App-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
